<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="625" viewBox="0 0 1280 625">
<rect width="100%" height="100%" fill="#fff8e1"/>
<rect x="60" y="220" width="240" height="160" rx="16" fill="#ffccbc" stroke="#5d4037" stroke-width="2"/>
<text x="180.0" y="306.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-24.75">Captain (Operator)</tspan>
<tspan x="180.0" dy="22.5"></tspan>
<tspan x="180.0" dy="22.5">pacto-bot-admin new echo-bot</tspan>
</text>
<rect x="460" y="220" width="300" height="180" rx="16" fill="#d7ccc8" stroke="#5d4037" stroke-width="2"/>
<text x="610.0" y="316.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-47.25">Flagship Daemon</tspan>
<tspan x="610.0" dy="22.5"></tspan>
<tspan x="610.0" dy="22.5">Remembers ships by flag:</tspan>
<tspan x="610.0" dy="22.5">• npub (public flag)</tspan>
<tspan x="610.0" dy="22.5">• bot_id (ship name)</tspan>
</text>
<rect x="880" y="170" width="240" height="140" rx="16" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
<text x="1000.0" y="246.0" font-family="sans-serif" font-size="18" fill="#ef6c00" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-36.0">Locked Chest</tspan>
<tspan x="1000.0" dy="22.5">(nsec dev-only)</tspan>
<tspan x="1000.0" dy="22.5"></tspan>
<tspan x="1000.0" dy="22.5">Key stays here</tspan>
</text>
<rect x="880" y="360" width="240" height="140" rx="16" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
<text x="1000.0" y="436.0" font-family="sans-serif" font-size="18" fill="#ef6c00" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-36.0">Vault Island</tspan>
<tspan x="1000.0" dy="22.5">(NIP-46 bunker)</tspan>
<tspan x="1000.0" dy="22.5"></tspan>
<tspan x="1000.0" dy="22.5">Key stays here</tspan>
</text>
<line x1="300" y1="300" x2="460" y2="300" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="320.0" y="275.3333333333333" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
register
</text>
<line x1="610" y1="260" x2="880" y2="240" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="685.0" y="225.33333333333334" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
never sees key
</text>
<line x1="610" y1="360" x2="880" y2="410" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="685.0" y="360.3333333333333" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
asks to sign
</text>
<text x="460" y="70.66666666666667" font-family="sans-serif" font-size="32" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
How a Bot Identity Joins the Fleet
</text>
<text x="60" y="546.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
The daemon knows the ship by its flag (npub), never by the key in the chest/vault.
</text>

<defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5d4037"/>
    </marker>
</defs>
</svg>