<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="605" viewBox="0 0 1280 605">
<rect width="100%" height="100%" fill="#fff8e1"/>
<rect x="60" y="240" width="240" height="160" rx="16" fill="#c8e6c9" stroke="#5d4037" stroke-width="2"/>
<text x="180.0" y="326.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-24.75">Handler Ship</tspan>
<tspan x="180.0" dy="22.5"></tspan>
<tspan x="180.0" dy="22.5">Python / Rust / any language</tspan>
</text>
<rect x="460" y="220" width="320" height="200" rx="16" fill="#d7ccc8" stroke="#5d4037" stroke-width="2"/>
<text x="620.0" y="326.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-69.75">Flagship Daemon</tspan>
<tspan x="620.0" dy="22.5"></tspan>
<tspan x="620.0" dy="22.5">Unix socket / HTTP</tspan>
<tspan x="620.0" dy="22.5">+ X-Pacto-Bot-Secret</tspan>
<tspan x="620.0" dy="22.5"></tspan>
<tspan x="620.0" dy="22.5">Checks capabilities</tspan>
<tspan x="620.0" dy="22.5">(Read, Send, Admin)</tspan>
</text>
<rect x="880" y="240" width="240" height="160" rx="16" fill="#fff9c4" stroke="#5d4037" stroke-width="2"/>
<text x="1000.0" y="326.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="middle" dominant-baseline="middle">
<tspan dy="-69.75">Permits/Licenses</tspan>
<tspan x="1000.0" dy="22.5">(Capabilities)</tspan>
<tspan x="1000.0" dy="22.5"></tspan>
<tspan x="1000.0" dy="22.5">• ReadMessages</tspan>
<tspan x="1000.0" dy="22.5">• SendMessages</tspan>
<tspan x="1000.0" dy="22.5">• SetProfile</tspan>
<tspan x="1000.0" dy="22.5">• Admin</tspan>
</text>
<line x1="300" y1="280" x2="460" y2="280" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="320.0" y="255.33333333333334" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
message in a bottle
<tspan x="320.0" dy="20.0">(handler.register)</tspan>
</text>
<line x1="780" y1="280" x2="880" y2="280" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="770.0" y="255.33333333333334" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
verify
</text>
<line x1="460" y1="350" x2="300" y2="380" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="320.0" y="340.3333333333333" font-family="sans-serif" font-size="16" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
agent.event
</text>
<text x="460" y="70.66666666666667" font-family="sans-serif" font-size="32" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
How a Ship Talks to the Flagship
</text>
<text x="60" y="526.0" font-family="sans-serif" font-size="18" fill="#5d4037" text-anchor="start" dominant-baseline="middle">
Handlers send JSON-RPC bottles; the flagship checks permits before doing anything.
</text>

<defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5d4037"/>
    </marker>
</defs>
</svg>