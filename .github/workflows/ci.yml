name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-dependencies:
    name: Cache dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Populate Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Warm dependency cache
        run: cargo fetch --locked

  lint-and-format:
    name: Validate
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

      # no need to run on every PR, as it is slow and not critical for CI. It can be run manually if needed.
      # - name: Check cargo deny
      #   run: |
      #     cargo install --locked cargo-deny
      #     cargo deny check

  contract-verification:
    name: Verify contract artifact
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build contract artifact and checksum
        id: artifact
        run: |
          version=$(python3 -c "import json; print(json.load(open('schemas/jsonrpc.json'))['info']['version'])")
          cp schemas/jsonrpc.json "pacto-contract-${version}.json"
          sha256sum "pacto-contract-${version}.json" > "pacto-contract-${version}.json.sha256"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify artifact matches snapshot
        run: |
          diff -q \
            "pacto-contract-${{ steps.artifact.outputs.version }}.json" \
            schemas/jsonrpc.json

      - name: Verify checksum file
        run: |
          sha256sum -c "pacto-contract-${{ steps.artifact.outputs.version }}.json.sha256"

      - name: Verify SDK generation from local artifact path
        run: |
          python python/scripts/generate.py \
            --contract-source "pacto-contract-${{ steps.artifact.outputs.version }}.json"
          git diff --exit-code python/src/pacto_bot_sdk/_generated/

      - name: Verify SDK generation from artifact URL
        run: |
          python3 -m http.server 8000 &
          sleep 1
          python python/scripts/generate.py \
            --contract-source "http://localhost:8000/pacto-contract-${{ steps.artifact.outputs.version }}.json"
          git diff --exit-code python/src/pacto_bot_sdk/_generated/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-generate
        run: cargo install cargo-generate --version 0.23.12

      - name: Run tests and generate coverage reports
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
          cargo llvm-cov report --html --output-dir coverage-html
          cargo llvm-cov report --json --summary-only > coverage.json

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
          if-no-files-found: error

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14
          if-no-files-found: error

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          retention-days: 14
          if-no-files-found: error

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-json

      - name: Enforce 80% coverage floor
        run: |
          python3 - <<'PY'
          import json, sys
          with open('coverage.json') as f:
              data = json.load(f)
          total = data.get('data', [{}])[0].get('totals', {}).get('lines', {})
          covered = total.get('covered', 0)
          count = total.get('count', 0)
          if count == 0:
              print('No lines found; treating as 0% coverage.')
              sys.exit(1)
          pct = covered / count * 100
          print(f'Line coverage: {pct:.2f}% ({covered}/{count})')
          if pct < 80:
              print('Coverage is below the required 80% floor.')
              sys.exit(1)
          PY

      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            const total = data.data?.[0]?.totals?.lines || {};
            const covered = total.covered || 0;
            const count = total.count || 0;
            const pct = count ? (covered / count * 100).toFixed(2) : '0.00';
            const body = `## Coverage Report\n\nLine coverage: **${pct}%** (${covered}/${count})\n\nMinimum required: **80%**`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # Build debug binaries once for the examples contract job.
  # This duplicates the debug build performed by the test job, but provides a
  # stable artifact path and independence from coverage-tool output.
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Build debug binaries
        env:
          GIT_COMMIT_SHORT: ${{ steps.vars.outputs.sha_short }}
        run: cargo build --bins -p pacto-bot-api -p pacto-bot-utils

      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-api-bin
          path: target/debug/pacto-bot-api
          retention-days: 14
          if-no-files-found: error

      - name: Upload admin binary
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-admin-bin
          path: target/debug/pacto-bot-admin
          retention-days: 14
          if-no-files-found: error

      - name: Upload create-mls-group binary
        uses: actions/upload-artifact@v4
        with:
          name: create-mls-group-bin
          path: target/debug/create-mls-group
          retention-days: 14
          if-no-files-found: error

  python-sdk:
    name: Python SDK tests
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: pacto-bot-api-bin
          path: target/debug

      - name: Download admin binary
        uses: actions/download-artifact@v4
        with:
          name: pacto-bot-admin-bin
          path: target/debug

      - name: Make binaries executable
        run: chmod +x target/debug/pacto-bot-api target/debug/pacto-bot-admin

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python/[dev]

      - name: Run Python SDK tests
        env:
          PACTO_BOT_API_BIN: ${{ github.workspace }}/target/debug/pacto-bot-api
          PACTO_BOT_ADMIN_BIN: ${{ github.workspace }}/target/debug/pacto-bot-admin
        run: |
          cd python
          python -m pytest tests/ -v

  examples-contract:
    name: Examples contract tests
    runs-on: ubuntu-latest
    needs: build-binaries
    # Allowed-to-fail informational check. Promote to required after 30
    # consecutive days with zero manifest-related failures on main.
    continue-on-error: true
    permissions:
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: pacto-bot-api-bin
          path: target/debug

      - name: Download admin binary
        uses: actions/download-artifact@v4
        with:
          name: pacto-bot-admin-bin
          path: target/debug

      - name: Make binaries executable
        run: chmod +x target/debug/pacto-bot-api target/debug/pacto-bot-admin

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python/[dev]

      - name: Run examples contract tests
        id: pytest
        env:
          PACTO_BOT_API_BIN: ${{ github.workspace }}/target/debug/pacto-bot-api
          PACTO_BOT_ADMIN_BIN: ${{ github.workspace }}/target/debug/pacto-bot-admin
        run: |
          cd python
          python -m pytest tests/test_examples_contract.py tests/test_manifest_validation.py -v

      - name: Submit Examples Contract Tests status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.pytest.outcome }}';
            const state = outcome === 'success' ? 'success' : 'failure';
            const description = outcome === 'success'
              ? 'Examples contract tests passed'
              : `Examples contract tests ${outcome}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'Examples Contract Tests',
              description,
            });

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: cache-dependencies
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check docs build
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  build-release:
    name: Build release
    runs-on: ubuntu-latest
    needs: [cache-dependencies, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Build release binaries
        env:
          GIT_COMMIT_SHORT: ${{ steps.vars.outputs.sha_short }}
        run: cargo build --bins --release -p pacto-bot-api -p pacto-bot-utils

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-api-release
          path: |
            target/release/pacto-bot-api
            target/release/pacto-bot-admin
            target/release/create-mls-group
          retention-days: 7
          if-no-files-found: error

  docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT_SHORT=${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check embedded version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          image="ghcr.io/${{ github.repository }}:main"
          version_output=$(docker run --rm "$image" pacto-bot-api --version)
          echo "Version output: $version_output"
          if echo "$version_output" | grep -qi 'unknown'; then
            echo "error: Docker image version still contains 'unknown' fallback" >&2
            exit 1
          fi
          echo "OK: Docker image embeds a real git SHA"
