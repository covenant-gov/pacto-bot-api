name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-artifact:
    name: Build contract artifact
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract contract version
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('schemas/jsonrpc.json'))['info']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build contract artifact and checksum
        run: |
          version="${{ steps.version.outputs.version }}"
          cp schemas/jsonrpc.json "pacto-contract-${version}.json"
          sha256sum "pacto-contract-${version}.json" > "pacto-contract-${version}.json.sha256"

      - name: Upload contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacto-contract
          path: |
            pacto-contract-*.json
            pacto-contract-*.json.sha256
          if-no-files-found: error

  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    needs: contract-artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            asset: darwin_amd64
          - target: aarch64-apple-darwin
            asset: darwin_arm64
          - target: x86_64-unknown-linux-musl
            asset: linux_amd64
          - target: aarch64-unknown-linux-musl
            asset: linux_arm64
          # - target: x86_64-pc-windows-gnu
          #   asset: windows_amd64
          # - target: x86_64-unknown-freebsd
          #   asset: freebsd_amd64

    steps:
      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version 0.23.0

      - name: Download contract artifact
        uses: actions/download-artifact@v4
        with:
          name: pacto-contract
          path: dist
          if-no-files-found: error

      - name: Verify artifact matches in-repo snapshot
        run: |
          version="${{ needs.contract-artifact.outputs.version }}"
          diff -q "dist/pacto-contract-${version}.json" schemas/jsonrpc.json

      - name: Build release binary
        env:
          GIT_COMMIT_SHORT: ${{ steps.vars.outputs.sha_short }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-api-${{ matrix.target }}
          path: target/${{ matrix.target }}
          retention-days: 30
          if-no-files-found: error

  pypi-publish:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: contract-artifact
    continue-on-error: true
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/pacto-bot-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download contract artifact
        uses: actions/download-artifact@v4
        with:
          name: pacto-contract
          path: dist
          if-no-files-found: error

      - name: Generate Python SDK from contract artifact
        run: |
          version="${{ needs.contract-artifact.outputs.version }}"
          python python/scripts/generate.py \
            --contract-source "dist/pacto-contract-${version}.json"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build Python SDK
        run: python -m build python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python/dist/

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [contract-artifact, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download contract artifact
        uses: actions/download-artifact@v4
        with:
          name: pacto-contract
          path: dist
          if-no-files-found: error

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pacto-bot-api-*

      - name: Reconstruct target layout
        run: |
          mkdir -p target
          for artifact_dir in artifacts/pacto-bot-api-*; do
            target_triple=$(basename "$artifact_dir" | sed 's/^pacto-bot-api-//')
            mv "$artifact_dir" "target/$target_triple"
          done

      - name: Package artifacts
        run: ./scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [contract-artifact, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT_SHORT=${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
