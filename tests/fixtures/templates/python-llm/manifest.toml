manifest_version = 1
language = "python"
kind = "llm"
description = "Python LLM bot template"

[compatibility]
contract = { name = "pacto-contract", range = ">=0.8.1, <0.9.0" }
sdk = { name = "pacto-bot-sdk", range = ">=0.5.1, <0.6.0" }
daemon = { range = ">=0.8.1, <0.9.0" }

protected_files = ["bot.py", "tests/test_handlers.py"]
