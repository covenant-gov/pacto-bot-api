manifest_version = 1
language = "python"
kind = "llm"
description = "Python LLM bot template"

[compatibility]
contract = { name = "pacto-contract", range = ">=0.6.0, <0.7.0" }
sdk = { name = "pacto-bot-sdk", range = ">=0.3.0, <0.4.0" }
daemon = { range = ">=0.6.0, <0.7.0" }

protected_files = ["bot.py", "tests/test_handlers.py"]
